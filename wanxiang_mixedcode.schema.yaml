# Rime schema settings
# encoding: utf-8
schema:
  schema_id: wanxiang_mixedcode
  name: "万象：英文与混合编码"
  version: "LTS"
  author: amzxyz
  description: |
    混合编码负责将英文、中英文混合、携带符号的词组等全部统一到这个方案中完成
engine:
  processors:
    - key_binder
    - speller
    - selector
    - navigator
    - express_editor
  segmentors:
    - abc_segmentor
  translators:
    - echo_translator
    - table_translator
  filters:
    - uniquifier

key_binder:
  __include: default:/key_binder?


speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz;"
  delimiter: " '"
  algebra:
    __include: yuan_algebra:/mixed/通用派生规则
    __patch: 
      - yuan_algebra:/mixed/flypy   #可选的选项有（全拼, 小鹤双拼, 环形鹤）
      - yuan_algebra:/18key    #26键->18键映射
translator:
  dictionary: wan.extended_mix
  user_dict: en
  enable_completion: true  #开启补全提示
  enable_sentence: true  #禁止造句
  initial_quality: 2  #初始权重
  comment_format:
    - xform/^.+$//  #清除所有注释