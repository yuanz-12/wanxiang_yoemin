# Rime dictionary
# encoding: utf-8
# 
# rime配置的部署位置：
# ~/.local/share/fcitx5/rime 或者 ~/.config/ibus/rime  (Linux)
# ~/Library/Rime  (Mac OS)
# %APPDATA%\Rime  (Windows)
# 
#

---
name: wan.extended
version: "LTS"
sort: by_weight  #字典初始排序，可選original或by_weight
use_preset_vocabulary: false
import_tables:
#万象词库
  - dicts/zi.pro            #字表，包含了所有带拼音的汉字
  - dicts/jichu.pro         #基础词库，2-3字词汇
  - dicts/lianxiang.pro     #联想词库，5字以上词汇，多用于输入前半段第二候选可以出来整段
  - dicts/cuoyin.pro        #错音错字，支持错音和错字输入的兼容，同时供超级注释lua使用会在输入错误音节打出的时候给予提示
  - dicts/duoyin.pro        #兼容词库，是基础词库的扩充，收录了多场景多种读音的词组
  - dicts/shici.pro         #诗词
  - dicts/diming.pro        #地名
  - dicts/wuzhong.pro       #物种多样性,在线供应：https://github.com/amzxyz/rime_wanxiang/tree/wanxiang/dicts
  - dicts/renming.pro       #人名,在线供应：https://github.com/amzxyz/rime_wanxiang/tree/wanxiang/dicts
#其他词库
  - dicts/yoe.pro           #渊默的自用词库
  - dicts/moe               #萌娘词库
#  - dicts/half_pinyin       #带调拼音词库（仅合法音节）
  - dicts/full_pinyin       #带调音节词库（含理论音节）
  - dicts/suzi.pro          #字表，各类简体字、民间俗字
  - dicts/yidu.pro          #异读词库，收录万象词库中不予收录的读音
...

