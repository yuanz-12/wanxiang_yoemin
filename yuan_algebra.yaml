李氏三拼:
  __append:
    # 0  万象词库转地球拼音词库
    - xform/^([a-z]+)(;.*)$/$1⑤$2/
    - xform/^(.*)ā(.*)(;.*)$/$1a$2①$3/
    - xform/^(.*)á(.*)(;.*)$/$1a$2②$3/
    - xform/^(.*)ǎ(.*)(;.*)$/$1a$2③$3/
    - xform/^(.*)à(.*)(;.*)$/$1a$2④$3/            # 剑jiàn;qd,rd → jian④;qd,rd
    - xform/^(.*)ȧ(.*)(;.*)$/$1a$2⑤$3/
    - xform/^(.*)ō(.*)(;.*)$/$1o$2①$3/
    - xform/^(.*)ó(.*)(;.*)$/$1o$2②$3/
    - xform/^(.*)ǒ(.*)(;.*)$/$1o$2③$3/
    - xform/^(.*)ò(.*)(;.*)$/$1o$2④$3/
    - xform/^(.*)ȯ(.*)(;.*)$/$1o$2⑤$3/
    - xform/^(.*)ē(.*)(;.*)$/$1e$2①$3/
    - xform/^(.*)é(.*)(;.*)$/$1e$2②$3/
    - xform/^(.*)ě(.*)(;.*)$/$1e$2③$3/
    - xform/^(.*)è(.*)(;.*)$/$1e$2④$3/
    - xform/^(.*)ė(.*)(;.*)$/$1e$2⑤$3/
    - xform/^(.*)ī(.*)(;.*)$/$1i$2①$3/
    - xform/^(.*)í(.*)(;.*)$/$1i$2②$3/
    - xform/^(.*)ǐ(.*)(;.*)$/$1i$2③$3/
    - xform/^(.*)ì(.*)(;.*)$/$1i$2④$3/
    - xform/^(.*)i̇(.*)(;.*)$/$1i$2⑤$3/
    - xform/^(.*)ū(.*)(;.*)$/$1u$2①$3/
    - xform/^(.*)ú(.*)(;.*)$/$1u$2②$3/
    - xform/^(.*)ǔ(.*)(;.*)$/$1u$2③$3/
    - xform/^(.*)ù(.*)(;.*)$/$1u$2④$3/
    - xform/^(.*)u̇(.*)(;.*)$/$1u$2⑤$3/
    - xform/^(.*)ǖ(.*)(;.*)$/$1v$2①$3/
    - xform/^(.*)ǘ(.*)(;.*)$/$1v$2②$3/
    - xform/^(.*)ǚ(.*)(;.*)$/$1v$2③$3/
    - xform/^(.*)ǜ(.*)(;.*)$/$1v$2④$3/
    - xform/^(.*)ü̇(.*)(;.*)$/$1ü$2⑤$3/
    - xform/^(.*)ü(.*)$/$1v$2/
    - xform/^(.*)ń(.*)(;.*)$/$1n$2②$3/
    - xform/^(.*)ň(.*)(;.*)$/$1n$2③$3/
    - xform/^(.*)ǹ(.*)(;.*)$/$1n$2④$3/
    - xform/^(.*)ḿ(.*)(;.*)$/$1m$2②$3/
    - xform/^(.*)m̀(.*)(;.*)$/$1m$2④$3/
    - xlit/①②③④⑤/12345                  # 剑jian④;qd,rd → jian4;qd,rd
    # 1  音节修正合并
    - derive/^shui2/shei2/
    - xform/^ng(\d)$/eng$1/
    - xform/^n(\d)/en$1/                   # 嗯    n4;kx → en4;kx
    - xform/^m(\d)(;.*)/me$1$2/
    #- erase/^xx$/

   # 2  拼音完整形式
    - xform/^([jqx])u/$1v/                 # 去    qu4;ts → qv4;ts
    - xform/iu/iou/                        # 球    qiu2;wq → qiou2;wq
    - xform/([uv])i/$1ei/                  # 规    gui1;fj → guei1;fj
    - xform/(?<![uwv])ong/ung/             # hong → hung    当ong前面不是uwv时，才会变成ung
    # - xform/([uwv])ong/$1ng/
    - xform/^yi?/i/                        # yi → i    yan → ian    yuan → iuan
    - xform/^wu?/u/                        # wu → u    wan → uan
    - xform/iu/v/                          # yu → v    iuan → van
    - xform/([iuv])n/$1en/                 # in → ien    un → uen
    # 3  異拼
    - xform/([bpm])ueng/$1ong/
    - xform/([bpm])veng/$1iong/
    - derive/ueng/ong/
    - derive/(?<![zcs])veng/iong/
    # - xform/(\w+)ueng/$1ong/
    # - xform/veng/iong/
    - erase/([bpm])([uv][a-z]+|v)(\d)$/
    - erase/fao(\d)$/
    - erase/(\w*)(iei|uong|vong)(\d)$/
    - erase/(\w*)v(ai|ou|ao)(\d)$/
    # 4  尖音處理

    # 5  音節合併
    - xform/^([zcs]h?|r)i(\d)(;.*)$/$1o$2$3/                # 日ri4;ka → ro4;ka    之zhi1;dn → zho1;dn    自zi4;po → zo4;po
    - xform/^([zcs])([aoe]\w*)(\d)(;.*)$/$1hi$2$3$4/        # 砸za2;uj → zhia2;uj    层ceng2;uy → chieng2;uy    自zo4;po → zhio4;po
    - xform/^([zcs])u([aoe]\w*)?(\d)(;.*)$/$1hv$2$3$4/      # 做zuo4;rw → zhvo4;rw
    - xform/^f([aoe]\w*)(\d)(;.*)$/ri$1$2$3/                # 发fa1;fy → ria1;fy
    - xform/^fiao(\d)$/riao$1/                              # 覅fiao4; → riao4;
    - xform/^fu([aoe]\w*)?(\d)(;.*)$/$1rv$2$3/              # 扶fu2;ff → rv2;ff    佛fuo2;rf → rvo2;rf
    
    # 6  第1碼聲母
    - xform/^b/Q/
    - xform/^p/W/
    - xform/^m/E/
    - xform/^[fr]/R/
    - xform/^d/A/
    - xform/^t/S/
    - xform/^n/D/
    - xform/^l/F/
    - xform/^[gj]/Z/                                 # 剑jian4;qd,rd → Zian4;qd,rd
    - xform/^[kq]/X/
    - xform/^[hx]/C/
    - xform/^([aoeiuv])/V$1/
    - xform/^zh?/T/
    - xform/^ch?/G/
    - xform/^sh?/B/
    # 7  第2碼韻母
    - xform/^([QWERTASDFGZXCVB])(a|an|ang)([1-5])(;.*)$/$1Q$2$3$4/
    - xform/^([QWERTASDFGZXCVB])(ai|ei|ao)([1-5])(;.*)$/$1W$2$3$4/
    - xform/^([QWERTASDFGZXCVB])(o|ou|ong)([1-5])(;.*)$/$1E$2$3$4/
    - xform/^([QWERTASDFGZXCVB])(e|en|eng)([1-5])(;.*)$/$1R$2$3$4/
    
    - xform/^([QWERTASDFGZXCVB])(ia|ian|iang)([1-5])(;.*)$/$1A$2$3$4/    # 剑Zian4;qd,rd → ZAian4;qd,rd
    - xform/^([QWERTASDFGZXCVB])(iai|iei|iao|i)([1-5])(;.*)$/$1S$2$3$4/
    - xform/^([QWERTASDFGZXCVB])(io|iou|iong)([1-5])(;.*)$/$1D$2$3$4/
    - xform/^([QWERTASDFGZXCVB])(ie|ien|ieng)([1-5])(;.*)$/$1F$2$3$4/
    
    - xform/^([QWERTASDFGZXCVB])(ua|uan|uang)([1-5])(;.*)$/$1Z$2$3$4/
    - xform/^([QWERTASDFGZXCVB])(uai|uei|uao)([1-5])(;.*)$/$1X$2$3$4/
    - xform/^([QWERTASDFGZXCVB])(uo|uou|uong|u)([1-5])(;.*)$/$1C$2$3$4/
    - xform/^([QWERTASDFGZXCVB])(ue|uen|ueng)([1-5])(;.*)$/$1V$2$3$4/
    
    - xform/^([QWERTASDFGZXCVB])(va|van|vang|er)([1-5])(;.*)$/$1T$2$3$4/
    - xform/^([QWERTASDFGZXCVB])(vo|vei|vong|v)([1-5])(;.*)$/$1G$2$3$4/
    - xform/^([QWERTASDFGZXCVB])(ve|ven|veng)([1-5])(;.*)$/$1B$2$3$4/
    # 8  第3碼去重碼&聲調
    - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)1(;.*)$/$1Q$3/
    - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)2(;.*)$/$1W$3/
    - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)3(;.*)$/$1E$3/
    - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)4(;.*)$/$1R$3/
    - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)5(;.*)$/$1T$3/

    - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)1(;.*)$/$1A$3/
    - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)2(;.*)$/$1S$3/
    - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)3(;.*)$/$1D$3/
    - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)4(;.*)$/$1F$3/      # 剑ZAian4;qd,rd → ZAF;qd,rd
    - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)5(;.*)$/$1G$3/

    - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]ng|[iuv]?ao|[uv])1(;.*)$/$1Z$3/
    - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]ng|[iuv]?ao|[uv])2(;.*)$/$1X$3/
    - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]ng|[iuv]?ao|[uv])3(;.*)$/$1C$3/
